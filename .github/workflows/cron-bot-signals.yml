name: Bot Signals (external scheduler)

# The intraday */15 scheduler now runs in Supabase (pg_cron + pg_net job
# `bot-signals-15min`, every 15 min Mon-Fri UTC), which fires far more reliably
# than GitHub's best-effort cron. To avoid two schedulers double-firing at the
# same :15 tick and racing on the same strategy (the handler has no DB-level
# lock -> could open two positions), the GitHub `schedule:` trigger is DISABLED.
# This workflow is kept only as a manual `workflow_dispatch` backstop.
#
# To re-enable GitHub as the primary again, uncomment the `schedule:` block
# below AND unschedule the Supabase job so only one scheduler is active.
# Requires the CRON_SECRET repo secret; cronUnauthorized() is fail-closed.

on:
  # schedule:
  #   - cron: "*/15 * * * 1-5"   # disabled — superseded by Supabase pg_cron
  workflow_dispatch: {}

concurrency:
  # Serialize runs so two overlapping invocations can't race on the same
  # strategy (the handler has no DB-level lock).
  group: cron-bot-signals
  cancel-in-progress: false

jobs:
  bot-signals:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/cron/bot-signals
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is not set"; exit 1
          fi
          code=$(curl -sS --max-time 120 -o response.json -w "%{http_code}" \
            -X GET "https://app.mizan.exchange/api/cron/bot-signals" \
            -H "Authorization: Bearer ${CRON_SECRET}")
          echo "HTTP ${code}"
          head -c 800 response.json || true
          echo ""
          if [ "$code" != "200" ]; then
            echo "::error::cron bot-signals returned HTTP ${code}"; exit 1
          fi
          echo "bot-signals triggered successfully"
