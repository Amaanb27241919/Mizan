<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MĪZAN — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0d1311;
      color: #e9e4d6;
      font-family: system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      text-align: center;
    }
    .wordmark {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #c9a24b;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #e9e4d6;
    }
    p {
      font-size: 0.9375rem;
      color: #8a8578;
      max-width: 22rem;
      line-height: 1.6;
    }
    button {
      margin-top: 0.5rem;
      padding: 0.625rem 1.5rem;
      background: #c9a24b;
      color: #0d1311;
      border: none;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="wordmark">MĪZAN</div>
  <h1>You're offline</h1>
  <p>MĪZAN is unavailable without a connection. Reconnect and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
